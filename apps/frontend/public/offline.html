<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KrishiMitra-AI Offline</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        margin: 0;
        background: #0f2d1e;
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 520px;
        background: rgba(15, 45, 30, 0.9);
        border-radius: 16px;
        padding: 28px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow: 0 16px 32px rgba(0, 0, 0, 0.3);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }
      p {
        margin: 0;
        color: rgba(255, 255, 255, 0.8);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Offline Mode</h1>
      <p>KrishiMitra-AI is offline right now. You can continue viewing cached data, and we will sync once you are online again.</p>
    </div>
  </body>
</html>
