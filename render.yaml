services:
  - name: krishimitra-ai-api
    type: web
    runtime: python
    plan: free
    region: singapore
    autoDeployTrigger: commit
    buildCommand: pip install --upgrade pip && pip install -r apps/backend/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --app-dir apps/backend
    healthCheckPath: /readyz
    buildFilter:
      paths:
        - apps/backend/**
        - render.yaml
        - README.md
        - docs/render-deployment.md
    envVars:
      - key: ENVIRONMENT
        value: development
      - key: DATABASE_URL
        value: ""
      - key: ALLOW_INMEMORY_DB_FALLBACK
        value: "true"
      - key: DB_CONNECT_MAX_ATTEMPTS
        value: "1"
      - key: DB_CONNECT_RETRY_DELAY_SECONDS
        value: "0.1"
      - key: ENFORCE_SECURE_SECRETS
        value: "false"
      - key: CORS_ORIGINS
        value: "*"
      - key: LOG_LEVEL
        value: INFO
      - key: CLIENT_ERROR_INGEST_ENABLED
        value: "true"
      - key: METRICS_ENABLED
        value: "true"
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_VALIDATION_MOCK_MODE
        value: "true"
      - key: RUNTIME_VALIDATION_MOCK_MODE
        value: "true"
      - key: PUBLIC_API_KEYS
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_REFRESH_SECRET_KEY
        generateValue: true
      - key: PUBLIC_API_BASE_URL
        sync: false
      - key: PUBLIC_WS_URL
        sync: false

  - name: krishimitra-ai-advisor
    type: web
    runtime: node
    plan: free
    region: singapore
    autoDeployTrigger: commit
    buildCommand: npm install --prefix apps/ai-advisor-service
    startCommand: npm --prefix apps/ai-advisor-service run start
    healthCheckPath: /readyz
    buildFilter:
      paths:
        - apps/ai-advisor-service/**
        - render.yaml
        - README.md
        - docs/render-deployment.md
    envVars:
      - key: NODE_ENV
        value: production
      - key: AWS_REGION
        value: ap-south-1
      - key: BEDROCK_MODEL_ID
        value: openai.gpt-oss-20b-1:0
      - key: BEDROCK_FALLBACK_MODEL_ID
        value: openai.gpt-oss-120b-1:0
      - key: ADVISOR_DEFAULT_LANGUAGE
        value: en
      - key: ADVISOR_RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: ADVISOR_RATE_LIMIT_MAX
        value: "30"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_SESSION_TOKEN
        sync: false

  - name: krishimitra-ai-web
    type: web
    runtime: static
    autoDeployTrigger: commit
    buildCommand: npm install --legacy-peer-deps && npm run frontend:build
    staticPublishPath: apps/frontend/dist
    buildFilter:
      paths:
        - apps/frontend/**
        - packages/shared/**
        - package.json
        - package-lock.json
        - render.yaml
        - README.md
        - docs/render-deployment.md
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_BASE_URL
        fromService:
          name: krishimitra-ai-api
          type: web
          envVarKey: PUBLIC_API_BASE_URL
      - key: VITE_WS_URL
        fromService:
          name: krishimitra-ai-api
          type: web
          envVarKey: PUBLIC_WS_URL
      - key: VITE_AI_ADVISOR_BASE_URL
        sync: false
      - key: VITE_APP_RELEASE
        value: render-production
    headers:
      - path: /*
        name: X-Frame-Options
        value: sameorigin
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
