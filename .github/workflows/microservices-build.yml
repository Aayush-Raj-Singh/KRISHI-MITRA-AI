name: Microservices Build

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-microservices:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - microservices.identity_service.main:app
          - microservices.advisory_service.main:app
          - microservices.recommendation_service.main:app
          - microservices.market_service.main:app
          - microservices.analytics_service.main:app
          - microservices.operations_service.main:app
          - microservices.support_service.main:app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build microservice image
        run: |
          docker build \
            --build-arg SERVICE_MODULE=${{ matrix.service }} \
            -f apps/backend/microservices/Dockerfile \
            -t krishimitra-${{ matrix.service }} \
            .
