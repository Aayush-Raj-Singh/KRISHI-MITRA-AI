version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
      nodejs: 20
    commands:
      - echo "Installing KrishiMitra-AI dependencies"
      - python -m pip install --upgrade pip
      - python -m pip install -r apps/backend/requirements.txt
      - python -m pip install pip-audit
      - curl -fsSL https://releases.hashicorp.com/terraform/1.12.2/terraform_1.12.2_linux_amd64.zip -o terraform.zip
      - unzip -o terraform.zip -d /usr/local/bin
      - rm -f terraform.zip
      - cd apps/frontend && npm ci && cd ../..
      - cd packages/shared && npm install && cd ../..
      - cd apps/mobile && npm install && cd ../..
  pre_build:
    commands:
      - echo "Running security and quality checks"
      - pip-audit -r apps/backend/requirements.txt
      - npm run security:check
      - cd apps/backend && python -m pytest tests -q && cd ../..
      - cd apps/frontend && npm run lint && cd ../..
      - cd packages/shared && npm run typecheck && cd ../..
      - cd apps/frontend && npm run test:run && cd ../..
      - cd apps/mobile && npm run typecheck && npm run test:run && npx expo config --type public && cd ../..
      - npm run infra:validate -- --check-fmt
  build:
    commands:
      - echo "Building frontend bundle"
      - cd apps/frontend && npm run build && cd ../..
      - echo "Syncing Capacitor Android shell"
      - cd apps/frontend && npm run cap:sync && cd ../..

artifacts:
  files:
    - apps/frontend/dist/**/*
    - apps/backend/**/*
